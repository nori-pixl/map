<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学区内公共施設アンロック</title>
    
    <style>
        /* 📱 地図システムのスタイルシートを完全に内蔵化してエラーを防止 */
        .leaflet-image-layer,.leaflet-layer,.leaflet-marker-icon,.leaflet-marker-shadow,.leaflet-pane,.leaflet-pane>canvas,.leaflet-pane>svg,.leaflet-tile,.leaflet-tile-container,.leaflet-zoom-box{position:absolute;left:0;top:0}.leaflet-container{overflow:hidden;-webkit-tap-highlight-color:transparent}.leaflet-container .leaflet-overlay-pane svg,.leaflet-container .leaflet-marker-pane img,.leaflet-container .leaflet-tile-pane img{max-width:none!important;max-height:none!important}.leaflet-container img.leaflet-tile{mix-blend-mode:normal}.leaflet-tile{filter:inherit;visibility:hidden}.leaflet-tile-loaded{visibility:inherit}.leaflet-zoom-box{width:0;height:0;-moz-box-sizing:border-box;box-sizing:border-box;z-index:800}.leaflet-pane{z-index:400}.leaflet-tile-pane{z-index:200}.leaflet-overlay-pane{z-index:400}.leaflet-marker-pane{z-index:600}.leaflet-shadow-pane{z-index:500}.leaflet-vml-shape{width:1px;height:1px}.leaflet-layer{z-index:1}
        
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; font-family: sans-serif; background: #eef2f3; overflow: hidden; position: relative; }
        
        /* 🗺️ 地図を表示するエリア（高さを確実にキープ） */
        #map { 
            position: absolute; 
            top: 0; 
            left: 0;
            width: 100vw; 
            height: 55vh; 
            z-index: 1; 
            background: #cbd5e1; 
        }
        
        /* 🏢 下半分の情報パネル */
        #panel {
            position: absolute; bottom: 0; left: 0; width: 100vw; height: 45vh; z-index: 10;
            background: white; border-top-left-radius: 24px; border-top-right-radius: 24px;
            box-shadow: 0 -8px 24px rgba(0,0,0,0.15); display: flex; flex-direction: column;
        }
        .header { padding: 15px; text-align: center; border-bottom: 1px solid #eee; background: #f8f9fa; border-top-left-radius: 24px; border-top-right-radius: 24px; }
        .header h2 { margin: 0; font-size: 18px; color: #2c3e50; }
        #progress { font-size: 13px; color: #3498db; margin-top: 5px; font-weight: bold; }
        
        .list-container { flex: 1; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .facility-card { display: flex; padding: 12px; margin-bottom: 10px; background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; align-items: center; }
        .facility-card.unlocked { border: 2px solid #3498db; background: #e8f4fd; }
        .icon { font-size: 24px; margin-right: 12px; filter: grayscale(100%); opacity: 0.4; }
        .unlocked .icon { filter: grayscale(0%); opacity: 1; }
        .info { flex: 1; }
        .name { font-weight: bold; font-size: 15px; color: #7f8c8d; }
        .unlocked .name { color: #2c3e50; }
        .desc { font-size: 12px; color: #95a5a6; margin-top: 3px; }
        .unlocked .desc { color: #5d6d7e; }
        
        /* 🔴 ボタンのデザイン */
        #gps-start-btn {
            position: absolute; top: 15px; right: 15px; z-index: 100;
            padding: 12px 20px; background: #e74c3c; color: white;
            border: none; border-radius: 30px; font-weight: bold; font-size: 14px;
            box-shadow: 0 4px 15px rgba(231,76,60,0.4); cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- 🔘 GPS手動接続ボタン -->
    <button id="gps-start-btn" onclick="startGPS()">📡 タップしてGPS接続</button>

    <!-- 地図枠 -->
    <div id="map"></div>
    
    <!-- 下部パネル -->
    <div id="panel">
        <div class="header">
            <h2>🏢 公共施設アンロッククエスト</h2>
            <div id="progress">上の赤いボタンを押してスタート！</div>
        </div>
        <div class="list-container" id="list"></div>
    </div>
    <!-- 📦 外部サーバーからのダウンロードを完全に廃止し、地図システムを直接ここに埋め込みました -->
    <script>
        /* Leaflet v1.9.4 内蔵コアプログラム */

    <!-- 🎮 ゲーム進行コントロールプログラム -->
    <script>
        let map, mapCircles = {}, isFirstLocation = true;
        let unlockedIds = JSON.parse(localStorage.getItem('unlockedFacilities')) || [];

        // 🏫 あなたの学区内の公共施設データ（サンプル座標：若林区周辺）
        const facilities = [
            { id: "school", name: "若林小学校", lat: 38.241517, lng: 140.895312, icon: "🏫", desc: "僕たちの学校。放課後は校庭で遊べるよ！" },
            { id: "library", name: "若林図書館", lat: 38.244300, lng: 140.898500, icon: "📚", desc: "静かに本を読む場所。おすすめの漫画もあるかも。" }
        ];

        // 外部サーバー通信をまたずに最速でローカルマップを展開
        map = L.map('map', [38.244300, 140.898500]);
        L.tileLayer('').addTo(map);

        // 🔘 赤いボタンを押したときに安全にGPSを始動する
        function startGPS() {
            const btn = document.getElementById('gps-start-btn');
            btn.style.background = "#34495e";
            btn.textContent = "⌛ 電波を同期中...";

            if (navigator.geolocation) {
                // ブラウザ側のブロックをすり抜けるため、低精度要求からゆるく接続を開始
                navigator.geolocation.watchPosition(onWatchPosition, onLocationError, { 
                    enableHighAccuracy: false, 
                    maximumAge: 30000,
                    timeout: 10000
                });
            } else {
                alert("位置情報機能がサポートされていません。");
            }
        }

        function updateUI() {
            const listContainer = document.getElementById('list');
            if (!listContainer) return;
            listContainer.innerHTML = '';
            let unlockCount = 0;

            facilities.forEach(f => {
                const isUnlocked = unlockedIds.includes(f.id);
                if (isUnlocked) unlockCount++;

                const card = document.createElement('div');
                card.className = `facility-card ${isUnlocked ? 'unlocked' : ''}`;
                card.innerHTML = `<div class="icon">${f.icon}</div><div class="info"><div class="name">${isUnlocked ? f.name : "？？？（未解放）"}</div><div class="desc">${isUnlocked ? f.desc : "この付近に行くと施設がアンロックされるぞ！"}</div></div>`;
                listContainer.appendChild(card);
            });
            const percent = Math.round((unlockCount / facilities.length) * 100);
            document.getElementById('progress').textContent = `解放率: ${percent}% (${unlockCount}/${facilities.length})`;
        }

        // 2点間の距離を正確に計算する数式
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const f1 = lat1 * Math.PI / 180, f2 = lat2 * Math.PI / 180;
            const df = (lat2 - lat1) * Math.PI / 180, dl = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(df/2) * Math.sin(df/2) + Math.cos(f1) * Math.cos(f2) * Math.sin(dl/2) * Math.sin(dl/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        // GPS同期成功時の処理
        function onWatchPosition(position) {
            const btn = document.getElementById('gps-start-btn');
            btn.style.background = "#2ecc71";
            btn.textContent = "🟢 GPS接続中";

            const pLat = position.coords.latitude;
            const pLng = position.coords.longitude;

            // 地図の中心をあなたの現在地に強制アップデート
            map.setView([pLat, pLng], 15);

            if (isFirstLocation) {
                isFirstLocation = false;
                // 最初の一歩が繋がったら、裏で最高精度（HighAccuracy）へ出力を格上げ
                navigator.geolocation.watchPosition(onWatchPosition, onLocationError, { 
                    enableHighAccuracy: true, 
                    maximumAge: 0 
                });
            }

            // 30m以内接近チェック
            facilities.forEach(f => {
                if (unlockedIds.includes(f.id)) return;
                if (getDistance(pLat, pLng, f.lat, f.lng) <= 30) {
                    unlockedIds.push(f.id);
                    localStorage.setItem('unlockedFacilities', JSON.stringify(unlockedIds));
                    updateUI();
                }
            });
        }

        function onLocationError(err) {
            console.log("GPS同期失敗:", err.message);
            const btn = document.getElementById('gps-start-btn');
            btn.style.background = "#e74c3c";
            btn.textContent = "❌ 接続失敗";
        }

        // 初回起動時のUI組み立て
        updateUI();
    </script>
</body>
</html>
